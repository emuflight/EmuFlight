on:
  push:
    tags:
    - '*'
    branches:
    - '*'
  pull_request:
    branches:
    - '*'
  workflow_dispatch:
  repository_dispatch:
    types: [ci]

name: CI Compile Validation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-validate:
    continue-on-error: false
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [CI_STM32F405, CI_STM32F411, CI_STM32F446, CI_STM32F7X2, CI_STM32F7X6, HELIOSPRING, STRIXF10]

    steps:
    - name: curl fix
      run: function curl () { command curl --connect-timeout 30 --retry 10 "$@" ; }

    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Cache build toolchain
      uses: actions/cache@v4
      id: cache-toolchain
      with:
        path: tools
        key: ${{ runner.os }}-${{ hashFiles('make/tools.mk') }}

    - name: Download and install toolchain
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: make arm_sdk_install

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Compile ${{ matrix.target }}
      run: make ${{ matrix.target }}

  ci-changed-targets:
    if: github.event_name == 'pull_request'
    continue-on-error: true
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
    - name: curl fix
      run: function curl () { command curl --connect-timeout 30 --retry 10 "$@" ; }

    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Cache build toolchain
      uses: actions/cache@v4
      id: cache-toolchain
      with:
        path: tools
        key: ${{ runner.os }}-${{ hashFiles('make/tools.mk') }}

    - name: Download and install toolchain
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: make arm_sdk_install

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Detect modified real targets
      id: changed
      run: |
        CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
          | grep '^src/main/target/' \
          | sed 's|src/main/target/||;s|/.*||' \
          | grep -v '^CI_' \
          | sort -u | tr '\n' ' ')
        echo "extra_targets=${CHANGED}" >> $GITHUB_OUTPUT
        echo "Changed real targets: ${CHANGED}"

    - name: Compile changed real targets
      if: steps.changed.outputs.extra_targets != ''
      run: make ${{ steps.changed.outputs.extra_targets }}
